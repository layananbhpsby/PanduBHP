<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanduBHP - Premium Dashboard v20.0</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js untuk Interaktivitas & State Login -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- FontAwesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tally Embed Widget Script -->
    <script async src="https://tally.so/widgets/embed.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        'biru-tua': '#0B192C',     
                        'biru-terang': '#1E3E62',  
                        'kuning-emas': '#E6B940',  
                        'krem-bg': '#F5F5F7',      
                        'krem-card': '#F9F6EE',    
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        
        /* TRICK ZOOM OUT SPREADSHEET (80% Scale) */
        .sheet-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .sheet-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 125%;
            height: 125%;
            transform: scale(0.8);
            transform-origin: top left;
            border: 0;
        }
    </style>
</head>
<body class="bg-krem-bg text-slate-800 font-sans" x-data="sidebarApp()">

    <!-- ================= SCREEN 1: HALAMAN LOGIN ORIGINAL (PEMULIHAN MUTLAK) ================= -->
    <div x-show="!isLoggedIn" x-cloak class="min-h-screen flex items-center justify-center bg-biru-tua p-4 relative overflow-hidden">
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-biru-terang/20 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-kuning-emas/10 rounded-full blur-3xl"></div>

        <div class="w-full max-w-md bg-slate-900/40 backdrop-blur-md border border-slate-800 p-8 rounded-3xl shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-kuning-emas to-amber-500 flex items-center justify-center font-bold text-biru-tua shadow-lg shadow-kuning-emas/20 mx-auto mb-4">
                    <i class="fa-solid fa-scale-balanced text-2xl"></i>
                </div>
                <h1 class="font-outfit font-bold text-2xl text-white tracking-wide">Pandu<span class="text-kuning-emas">BHP</span></h1>
                <p class="text-xs text-slate-400 mt-1">Balai Harta Peninggalan Surabaya</p>
            </div>

            <div x-show="loginError" x-transition class="mb-4 bg-red-950/40 border border-red-500/30 text-red-400 text-xs py-3 px-4 rounded-xl flex items-center gap-2">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span x-text="loginError"></span>
            </div>

            <form @submit.prevent="handleLogin" class="space-y-5">
                <div>
                    <label class="block text-xs font-medium text-slate-300 mb-2 font-mono tracking-wider">NAMA PENGGUNA (USERNAME)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-user-shield text-xs"></i>
                        </span>
                        <input type="text" x-model="username" required placeholder="Contoh: Verifikator.Budhi" 
                               class="w-full bg-slate-950/50 border border-slate-800 focus:border-kuning-emas rounded-xl py-3.5 pl-11 pr-4 text-sm text-white placeholder-slate-600 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-medium text-slate-300 mb-2 font-mono tracking-wider">KATA SANDI (PASSWORD)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-lock text-xs"></i>
                        </span>
                        <input type="password" x-model="password" required placeholder="Masukkan password..." 
                               class="w-full bg-slate-950/50 border border-slate-800 focus:border-kuning-emas rounded-xl py-3.5 pl-11 pr-4 text-sm text-white placeholder-slate-600 outline-none transition-all">
                    </div>
                </div>

                <button type="submit" 
                        class="w-full bg-gradient-to-r from-amber-500 to-kuning-emas hover:from-amber-600 hover:to-amber-500 text-biru-tua text-sm font-bold py-3.5 px-4 rounded-xl transition shadow-lg shadow-amber-500/10 flex items-center justify-center gap-2 mt-2">
                    <span>Masuk ke Dasbor</span>
                    <i class="fa-solid fa-arrow-right-to-bracket text-xs"></i>
                </button>
            </form>

            <div class="mt-8 text-center text-[10px] text-slate-600 font-mono">
                SISTEM OTENTIKASI INTERNAL &copy; 2026
            </div>
        </div>
    </div>


    <!-- ================= SCREEN 2: MAIN DASHBOARD WORKSPACE ================= -->
    <div x-show="isLoggedIn" x-transition.opacity class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR KIRI -->
        <aside class="w-72 bg-biru-tua text-slate-300 flex flex-col justify-between border-r border-slate-800 transition-all duration-300">
            <div>
                <!-- USER LOGIN SECTION -->
                <div class="p-5 border-b border-slate-800 flex items-center justify-between bg-slate-950/20 group">
                    <div class="flex items-center gap-3">
                        <div class="w-11 h-11 rounded-xl bg-gradient-to-tr from-kuning-emas to-amber-500 flex items-center justify-center font-bold text-biru-tua shadow-md shadow-kuning-emas/10">
                            <i class="fa-solid fa-user-tie text-lg"></i>
                        </div>
                        <div class="overflow-hidden">
                            <p class="text-sm font-semibold text-white truncate" x-text="username"></p>
                            <p class="text-[11px] text-kuning-emas font-mono tracking-wider truncate">BHP SURABAYA</p>
                        </div>
                    </div>
                    <button @click="handleLogout()" title="Keluar Aplikasi" class="text-slate-500 hover:text-red-400 p-2 rounded-lg hover:bg-slate-800 transition duration-150">
                        <i class="fa-solid fa-power-off text-xs"></i>
                    </button>
                </div>

                <!-- Branding Aplikasi -->
                <div class="px-6 py-4 flex items-center gap-2">
                    <span class="text-kuning-emas text-xl"><i class="fa-solid fa-scale-balanced"></i></span>
                    <h1 class="font-outfit font-bold text-lg text-white tracking-wide">Pandu<span class="text-kuning-emas">BHP</span></h1>
                </div>

                <!-- NAVIGASI MENU UTAMA -->
                <nav class="p-4 space-y-1">
                    <button @click="currentTab = 'dashboard'; openKlikLayanan = false; openLegalisasi = false" 
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all duration-150"
                            :class="currentTab === 'dashboard' ? 'bg-biru-terang text-white border-l-4 border-kuning-emas shadow-lg' : 'hover:bg-biru-terang/40 hover:text-white'">
                        <i class="fa-solid fa-chart-pie text-base" :class="currentTab === 'dashboard' ? 'text-kuning-emas' : ''"></i>
                        <span>Dashboard Statistik</span>
                    </button>

                    <!-- DROPDOWN GROUP 1: KLIK LAYANAN -->
                    <div class="space-y-1">
                        <button @click="openKlikLayanan = !openKlikLayanan; openLegalisasi = false" 
                                class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-medium transition-all duration-150"
                                :class="(currentTab === 'permohonan-baru' || currentTab === 'verifikasi-layanan' || currentTab === 'verifikasi-pnbp' || currentTab === 'disposisi-berkas' || currentTab === 'layanan-selesai' || currentTab === 'tanda-terima') ? 'bg-biru-terang/50 text-white' : 'hover:bg-biru-terang/40 hover:text-white'">
                            <div class="flex items-center gap-3">
                                <i class="fa-solid fa-hand-pointer text-base" :class="(currentTab === 'permohonan-baru' || currentTab === 'verifikasi-layanan' || currentTab === 'verifikasi-pnbp' || currentTab === 'disposisi-berkas' || currentTab === 'layanan-selesai' || currentTab === 'tanda-terima') ? 'text-kuning-emas' : ''"></i>
                                <span>Klik Layanan</span>
                            </div>
                            <i class="fa-solid fa-chevron-down text-xs transition-transform duration-200" :class="openKlikLayanan ? 'rotate-180 text-kuning-emas' : ''"></i>
                        </button>

                        <div x-show="openKlikLayanan" x-cloak x-transition class="pl-6 space-y-1 mt-1 border-l border-slate-800 ml-6">
                            <button @click="currentTab = 'permohonan-baru'" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-medium transition-all duration-150" :class="currentTab === 'permohonan-baru' ? 'bg-biru-terang text-white border-l-2 border-kuning-emas font-semibold shadow-md' : 'hover:bg-biru-terang/30 text-slate-400 hover:text-white'">
                                <i class="fa-solid fa-circle-plus text-xs"></i><span>Permohonan Baru</span>
                            </button>
                            <button @click="currentTab = 'verifikasi-layanan'" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-medium transition-all duration-150" :class="currentTab === 'verifikasi-layanan' ? 'bg-biru-terang text-white border-l-2 border-kuning-emas font-semibold shadow-md' : 'hover:bg-biru-terang/30 text-slate-400 hover:text-white'">
                                <i class="fa-solid fa-list-check text-xs"></i><span>Verifikasi Berkas</span>
                            </button>
                            <button @click="currentTab = 'verifikasi-pnbp'" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-medium transition-all duration-150" :class="currentTab === 'verifikasi-pnbp' ? 'bg-biru-terang text-white border-l-2 border-kuning-emas font-semibold shadow-md' : 'hover:bg-biru-terang/30 text-slate-400 hover:text-white'">
                                <i class="fa-solid fa-receipt text-xs"></i><span>Verifikasi PNBP</span>
                            </button>
                            <button @click="currentTab = 'disposisi-berkas'" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-medium transition-all duration-150" :class="currentTab === 'disposisi-berkas' ? 'bg-biru-terang text-white border-l-2 border-kuning-emas font-semibold shadow-md' : 'hover:bg-biru-terang/30 text-slate-400 hover:text-white'">
                                <i class="fa-solid fa-file-signature text-xs"></i><span>Disposisi Berkas</span>
                            </button>
                            <button @click="currentTab = 'layanan-selesai'" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-medium transition-all duration-150" :class="currentTab === 'layanan-selesai' ? 'bg-biru-terang text-white border-l-2 border-kuning-emas font-semibold shadow-md' : 'hover:bg-biru-terang/30 text-slate-400 hover:text-white'">
                                <i class="fa-solid fa-circle-check text-xs"></i><span>Layanan Selesai</span>
                            </button>
                            <button @click="currentTab = 'tanda-terima'" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-medium transition-all duration-150" :class="currentTab === 'tanda-terima' ? 'bg-biru-terang text-white border-l-2 border-kuning-emas font-semibold shadow-md' : 'hover:bg-biru-terang/30 text-slate-400 hover:text-white'">
                                <i class="fa-solid fa-file-invoice text-xs"></i><span>Tanda Terima</span>
                            </button>
                        </div>
                    </div>

                    <!-- MENU UTAMA: ZOOMPAH -->
                    <button @click="currentTab = 'zoompah'; openKlikLayanan = false; openLegalisasi = false" 
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all duration-150"
                            :class="currentTab === 'zoompah' ? 'bg-biru-terang text-white border-l-4 border-kuning-emas shadow-lg' : 'hover:bg-biru-terang/40 hover:text-white'">
                        <i class="fa-solid fa-gavel text-base"></i>
                        <span>Zoompah Wali/Pengampu</span>
                    </button>

                    <!-- MENU UTAMA: E-LAPOR -->
                    <button @click="currentTab = 'elapor'; openKlikLayanan = false; openLegalisasi = false" 
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all duration-150"
                            :class="currentTab === 'elapor' ? 'bg-biru-terang text-white border-l-4 border-kuning-emas shadow-lg' : 'hover:bg-biru-terang/40 hover:text-white'">
                        <i class="fa-solid fa-bullhorn text-base"></i>
                        <span>e-Lapor Pengampu/Wali</span>
                    </button>

                    <!-- MENU UTAMA: DATA BANTU REGISTER -->
                    <button @click="currentTab = 'databantu'; openKlikLayanan = false; openLegalisasi = false" 
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all duration-150"
                            :class="currentTab === 'databantu' ? 'bg-biru-terang text-white border-l-4 border-kuning-emas shadow-lg' : 'hover:bg-biru-terang/40 hover:text-white'">
                        <i class="fa-solid fa-database text-base"></i>
                        <span>Data Bantu Register</span>
                    </button>

                    <!-- DROPDOWN GROUP 2: LEGALISASI DOKUMEN -->
                    <div class="space-y-1">
                        <button @click="openLegalisasi = !openLegalisasi; openKlikLayanan = false" 
                                class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-medium transition-all duration-150"
                                :class="(currentTab === 'legalisasi-permohonan' || currentTab === 'legalisasi-verifikasi' || currentTab === 'legalisasi-terima') ? 'bg-biru-terang/50 text-white' : 'hover:bg-biru-terang/40 hover:text-white'">
                            <div class="flex items-center gap-3">
                                <i class="fa-solid fa-stamp text-base"></i>
                                <span>Legalisasi Dokumen</span>
                            </div>
                            <i class="fa-solid fa-chevron-down text-xs transition-transform duration-200" :class="openLegalisasi ? 'rotate-180 text-kuning-emas' : ''"></i>
                        </button>

                        <div x-show="openLegalisasi" x-cloak x-transition class="pl-6 space-y-1 mt-1 border-l border-slate-800 ml-6">
                            <button @click="currentTab = 'legalisasi-permohonan'" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-medium transition-all duration-150" :class="currentTab === 'legalisasi-permohonan' ? 'bg-biru-terang text-white border-l-2 border-kuning-emas font-semibold shadow-md' : 'hover:bg-biru-terang/30 text-slate-400 hover:text-white'">
                                <i class="fa-solid fa-file-signature text-xs"></i><span>Permohonan</span>
                            </button>
                            <button @click="currentTab = 'legalisasi-verifikasi'" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-medium transition-all duration-150" :class="currentTab === 'legalisasi-verifikasi' ? 'bg-biru-terang text-white border-l-2 border-kuning-emas font-semibold shadow-md' : 'hover:bg-biru-terang/30 text-slate-400 hover:text-white'">
                                <i class="fa-solid fa-clipboard-check text-xs"></i><span>Verifikasi</span>
                            </button>
                            <button @click="currentTab = 'legalisasi-terima'" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-medium transition-all duration-150" :class="currentTab === 'legalisasi-terima' ? 'bg-biru-terang text-white border-l-2 border-kuning-emas font-semibold shadow-md' : 'hover:bg-biru-terang/30 text-slate-400 hover:text-white'">
                                <i class="fa-solid fa-receipt text-xs"></i><span>Tanda Terima</span>
                            </button>
                        </div>
                    </div>
                </nav>
            </div>

            <div class="p-4 border-t border-slate-800 text-xs text-slate-500 font-mono text-center bg-slate-950/30">
                PANDUBHP V20.0 &copy; 2026
            </div>
        </aside>

        <!-- KONTEN UTAMA KANAN -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white border-b border-slate-200/80 h-20 flex items-center px-8 sticky top-0 z-10 shadow-xs">
                <div>
                    <h2 class="text-xl font-outfit font-bold text-biru-tua" x-text="getTabTitle()"></h2>
                    <p class="text-xs text-slate-400 mt-0.5">Balai Harta Peninggalan Surabaya</p>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-8">
                
                <!-- ================= 1. HALAMAN UTAMA DASHBOARD (LOOKER STUDIO INTEGRATED) ================= -->
                <template x-if="currentTab === 'dashboard'">
                    <div class="space-y-4 h-full flex flex-col min-h-[750px] bg-white border border-slate-200 rounded-3xl p-4 shadow-sm relative">
                        <div class="w-full h-full min-h-[700px] rounded-2xl overflow-hidden relative">
                            <!-- INTEGRASI IFRAME DARI CORETAN SKEMA KAWAN -->
                            <iframe src="https://datastudio.google.com/embed/reporting/17484932-5030-49d5-ac91-2c39110a609c/page/gjj3F" 
                                    class="w-full h-full min-h-[700px] border-0" 
                                    frameborder="0" 
                                    style="border:0" 
                                    allowfullscreen 
                                    sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
                            </iframe>
                        </div>
                    </div>
                </template>

                <!-- 2. PERMOHONAN BARU -->
                <template x-if="currentTab === 'permohonan-baru'">
                    <div class="space-y-4 h-full flex flex-col min-h-[650px]">
                        <div class="flex-1 bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden relative">
                            <iframe :src="tallyUrl" class="w-full h-full border-0" title="Layanan Publik" frameborder="0"></iframe>
                        </div>
                    </div>
                </template>

                <!-- 3. VERIFIKASI BERKAS -->
                <template x-if="currentTab === 'verifikasi-layanan'">
                    <div class="space-y-4 h-full flex flex-col min-h-[650px]">
                        <div class="w-full flex-1 bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden relative">
                            <div class="sheet-container">
                                <iframe :src="sheetEmbedUrl" class="sheet-iframe" title="Database Terpadu BHP" frameborder="0"></iframe>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- 4. VERIFIKASI PNBP -->
                <template x-if="currentTab === 'verifikasi-pnbp'">
                    <div class="space-y-4 h-full flex flex-col min-h-[650px]">
                        <div class="w-full flex-1 bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden relative">
                            <div class="sheet-container">
                                <iframe :src="pnbpSheetEmbedUrl" class="sheet-iframe" title="Database PNBP" frameborder="0"></iframe>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- 5. DISPOSISI BERKAS -->
                <template x-if="currentTab === 'disposisi-berkas'">
                    <div class="space-y-4 h-full flex flex-col min-h-[700px]">
                        <div class="flex-1 bg-slate-50 border border-slate-200 rounded-2xl shadow-sm overflow-hidden flex justify-center p-4">
                            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfYaM6FZOQHiB806f453lUu0y5rMT53ggysjZxBdhXZCSju1A/viewform?embedded=true" class="w-full max-w-3xl h-full border-0 rounded-xl bg-white" title="Form Disposisi" frameborder="0"></iframe>
                        </div>
                    </div>
                </template>

                <!-- 6. LAYANAN SELESAI -->
                <template x-if="currentTab === 'layanan-selesai'">
                    <div class="space-y-6 h-full flex flex-col">
                        <div class="flex-1 min-h-[500px] bg-white border border-slate-200 rounded-2xl shadow-sm p-5 flex flex-col gap-3">
                            <div class="flex-1 overflow-hidden relative rounded-xl border border-slate-100">
                                <div class="sheet-container">
                                    <iframe :src="gformLayananSelesaiSheetUrl" class="sheet-iframe" title="Database Layanan Selesai" frameborder="0"></iframe>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- 7. TANDA TERIMA -->
                <template x-if="currentTab === 'tanda-terima'">
                    <div class="space-y-6 h-full flex flex-col">
                        <div class="flex-1 min-h-[500px] bg-white border border-slate-200 rounded-2xl shadow-sm p-5 flex flex-col gap-3">
                            <div class="flex-1 overflow-hidden relative rounded-xl border border-slate-100">
                                <div class="sheet-container">
                                    <iframe :src="sheetTandaTerimaEmbedUrl" class="sheet-iframe" title="Monitoring Tanda Terima" frameborder="0"></iframe>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- 8. ZOOMPAH -->
                <template x-if="currentTab === 'zoompah'">
                    <div class="w-full flex-1 bg-white border border-slate-200 rounded-2xl shadow-sm p-4 overflow-hidden relative min-h-[650px]">
                        <iframe src="https://calendar.google.com/calendar/embed?src=layanan.bhpsby%40gmail.com&ctz=Asia%2FJakarta" style="border: 0" class="w-full h-full" frameborder="0" scrolling="no"></iframe>
                    </div>
                </template>

                <!-- 9. E-LAPOR -->
                <template x-if="currentTab === 'elapor'">
                    <div class="h-full w-full"></div>
                </template>

                <!-- 10. DATA BANTU REGISTER -->
                <template x-if="currentTab === 'databantu'">
                    <div class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="bg-white rounded-3xl border border-slate-200 p-6 shadow-sm flex flex-col justify-between min-h-[220px]">
                                <h4 class="font-outfit font-bold text-lg text-biru-tua">Register Wilayah I</h4>
                                <a :href="sheetBantuWilayah1Url" target="_blank" class="w-full bg-slate-900 text-white text-xs text-center py-3 rounded-xl font-bold">Buka Spreadsheet</a>
                            </div>
                            <div class="bg-white rounded-3xl border border-slate-200 p-6 shadow-sm flex flex-col justify-between min-h-[220px]">
                                <h4 class="font-outfit font-bold text-lg text-biru-tua">Register Wilayah II</h4>
                                <a :href="sheetBantuWilayah2Url" target="_blank" class="w-full bg-slate-900 text-white text-xs text-center py-3 rounded-xl font-bold">Buka Spreadsheet</a>
                            </div>
                            <div class="bg-white rounded-3xl border border-slate-200 p-6 shadow-sm flex flex-col justify-between min-h-[220px]">
                                <h4 class="font-outfit font-bold text-lg text-biru-tua">Register Wilayah III</h4>
                                <a :href="sheetBantuWilayah3Url" target="_blank" class="w-full bg-slate-900 text-white text-xs text-center py-3 rounded-xl font-bold">Buka Spreadsheet</a>
                            </div>
                        </div>
                    </div>
                </template>
