<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanduBHP - Premium Dashboard v16.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script async src="https://tally.so/widgets/embed.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        'biru-tua': '#0B192C',     
                        'biru-terang': '#1E3E62',  
                        'kuning-emas': '#E6B940',  
                        'krem-bg': '#F5F5F7',      
                        'krem-card': '#F9F6EE',    
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        
        /* TRICK ZOOM OUT SPREADSHEET (80% Scale) */
        .sheet-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .sheet-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 125%;
            height: 125%;
            transform: scale(0.8);
            transform-origin: top left;
            border: 0;
        }
    </style>
</head>
<body class="bg-krem-bg text-slate-800 font-sans" x-data="sidebarApp()">

    <div x-show="!isLoggedIn" x-cloak class="min-h-screen flex items-center justify-center bg-biru-tua p-4 relative overflow-hidden">
        
        <div class="absolute inset-0 z-0 opacity-25 mix-blend-luminosity bg-cover bg-center bg-no-repeat" 
             style="background-image: url('ChatGPT Image 11 Des 2025, 12.02.27.png'); filter: contrast(110%) brightness(90%);">
        </div>
        
        <div class="absolute inset-0 z-0 bg-gradient-to-t from-biru-tua via-biru-tua/80 to-transparent"></div>
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-biru-terang/30 rounded-full blur-3xl z-0"></div>
        <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-kuning-emas/10 rounded-full blur-3xl z-0"></div>

        <div class="w-full max-w-md bg-slate-900/60 backdrop-blur-xl border border-slate-800/80 p-8 rounded-3xl shadow-2xl relative z-10">
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-kuning-emas to-amber-500 flex items-center justify-center font-bold text-biru-tua shadow-lg shadow-kuning-emas/20 mx-auto mb-4">
                    <i class="fa-solid fa-scale-balanced text-2xl"></i>
                </div>
                <h1 class="font-outfit font-bold text-2xl text-white tracking-wide">Pandu<span class="text-kuning-emas">BHP</span></h1>
                <p class="text-xs text-slate-300 mt-1">Balai Harta Peninggalan Surabaya</p>
            </div>

            <div x-show="loginError" x-transition class="mb-4 bg-red-950/40 border border-red-500/30 text-red-400 text-xs py-3 px-4 rounded-xl flex items-center gap-2">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span x-text="loginError"></span>
            </div>

            <form @submit.prevent="handleLogin" class="space-y-5">
                <div>
                    <label class="block text-xs font-medium text-slate-300 mb-2 font-mono tracking-wider">NAMA PENGGUNA (USERNAME)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-user-shield text-xs"></i>
                        </span>
                        <input type="text" x-model="username" required placeholder="Contoh: Verifikator.Budhi" 
                               class="w-full bg-slate-950/60 border border-slate-800 focus:border-kuning-emas rounded-xl py-3.5 pl-11 pr-4 text-sm text-white placeholder-slate-600 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-medium text-slate-300 mb-2 font-mono tracking-wider">KATA SANDI (PASSWORD)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-lock text-xs"></i>
                        </span>
                        <input type="password" x-model="password" required placeholder="Masukkan password..." 
                               class="w-full bg-slate-950/60 border border-slate-800 focus:border-kuning-emas rounded-xl py-3.5 pl-11 pr-4 text-sm text-white placeholder-slate-600 outline-none transition-all">
                    </div>
                </div>

                <button type="submit" 
                        class="w-full bg-gradient-to-r from-amber-500 to-kuning-emas hover:from-amber-600 hover:to-amber-500 text-biru-tua text-sm font-bold py-3.5 px-4 rounded-xl transition shadow-lg shadow-amber-500/10 flex items-center justify-center gap-2 mt-2">
                    <span>Masuk ke Dasbor</span>
                    <i class="fa-solid fa-arrow-right-to-bracket text-xs"></i>
                </button>
            </form>

            <div class="mt-8 text-center text-[10px] text-slate-500 font-mono">
                SISTEM OTENTIKASI INTERNAL &copy; 2026
            </div>
        </div>
    </div>


    <div x-show="isLoggedIn" x-transition.opacity class="flex h-screen overflow-hidden">
        
        <aside class="w-72 bg-biru-tua text-slate-300 flex flex-col justify-between border-r border-slate-800 transition-all duration-300">
            <div>
                <div class="p-5 border-b border-slate-800 flex items-center justify-between bg-slate-950/20 group">
                    <div class="flex items-center gap-3">
                        <div class="w-11 h-11 rounded-xl bg-gradient-to-tr from-kuning-emas to-amber-500 flex items-center justify-center font-bold text-biru-tua shadow-md shadow-kuning-emas/10">
                            <i class="fa-solid fa-user-tie text-lg"></i>
                        </div>
                        <div class="overflow-hidden">
                            <p class="text-sm font-semibold text-white truncate" x-text="username"></p>
                            <p class="text-[11px] text-kuning-emas font-mono tracking-wider truncate">BHP SURABAYA</p>
                        </div>
                    </div>
                    <button @click="handleLogout()" title="Keluar Aplikasi" class="text-slate-500 hover:text-red-400 p-2 rounded-lg hover:bg-slate-800 transition duration-150">
                        <i class="fa-solid fa-power-off text-xs"></i>
                    </button>
                </div>

                <div class="px-6 py-4 flex items-center gap-2">
                    <span class="text-kuning-emas text-xl"><i class="fa-solid fa-scale-balanced"></i></span>
                    <h1 class="font-outfit font-bold text-lg text-white tracking-wide">Pandu<span class="text-kuning-emas">BHP</span></h1>
                </div>

                <nav class="p-4 space-y-1">
                    <button @click="currentTab = 'dashboard'; openKlikLayanan = false" 
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all duration-150"
                            :class="currentTab === 'dashboard' ? 'bg-biru-terang text-white border-l-4 border-kuning-emas shadow-lg' : 'hover:bg-biru-terang/40 hover:text-white'">
                        <i class="fa-solid fa-chart-pie text-base" :class="currentTab === 'dashboard' ? 'text-kuning-emas' : ''"></i>
                        <span>Dashboard Statistik</span>
                    </button>

                    <div class="space-y-1">
                        <button @click="openKlikLayanan = !openKlikLayanan" 
                                class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-medium transition-all duration-150"
                                :class="(currentTab === 'permohonan-baru' || currentTab === 'disposisi-berkas' || currentTab === 'verifikasi-layanan' || currentTab === 'verifikasi-pnbp' || currentTab === 'layanan-selesai') ? 'bg-biru-terang/50 text-white' : 'hover:bg-biru-terang/40 hover:text-white'">
                            <div class="flex items-center gap-3">
                                <i class="fa-solid fa-hand-pointer text-base" :class="(currentTab === 'permohonan-baru' || currentTab === 'disposisi-berkas' || currentTab === 'verifikasi-layanan' || currentTab === 'verifikasi-pnbp' || currentTab === 'layanan-selesai') ? 'text-kuning-emas' : ''"></i>
                                <span>Klik Layanan</span>
                            </div>
                            <i class="fa-solid fa-chevron-down text-xs transition-transform duration-200" :class="openKlikLayanan ? 'rotate-180 text-kuning-emas' : ''"></i>
                        </button>

                        <div x-show="openKlikLayanan" x-cloak x-transition class="pl-6 space-y-1 mt-1 border-l border-slate-800 ml-6">
                            <button @click="currentTab = 'permohonan-baru'" 
                                    class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-medium transition-all duration-150"
                                    :class="currentTab === 'permohonan-baru' ? 'bg-biru-terang text-white border-l-2 border-kuning-emas font-semibold shadow-md' : 'hover:bg-biru-terang/30 text-slate-400 hover:text-white'">
                                <i class="fa-solid fa-circle-plus text-xs" :class="currentTab === 'permohonan-baru' ? 'text-kuning-emas' : ''"></i>
                                <span>Permohonan Baru</span>
                            </button>

                            <button @click="currentTab = 'verifikasi-layanan'" 
                                    class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-medium transition-all duration-150"
                                    :class="currentTab === 'verifikasi-layanan' ? 'bg-biru-terang text-white border-l-2 border-kuning-emas font-semibold shadow-md' : 'hover:bg-biru-terang/30 text-slate-400 hover:text-white'">
                                <i class="fa-solid fa-list-check text-xs" :class="currentTab === 'verifikasi-layanan' ? 'text-kuning-emas' : ''"></i>
                                <span>Verifikasi Berkas</span>
                            </button>

                            <button @click="currentTab = 'verifikasi-pnbp'" 
                                    class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-medium transition-all duration-150"
                                    :class="currentTab === 'verifikasi-pnbp' ? 'bg-biru-terang text-white border-l-2 border-kuning-emas font-semibold shadow-md' : 'hover:bg-biru-terang/30 text-slate-400 hover:text-white'">
                                <i class="fa-solid fa-receipt text-xs" :class="currentTab === 'verifikasi-pnbp' ? 'text-kuning-emas' : ''"></i>
                                <span>Verifikasi PNBP</span>
                            </button>

                            <button @click="currentTab = 'disposisi-berkas'" 
                                    class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-medium transition-all duration-150"
                                    :class="currentTab === 'disposisi-berkas' ? 'bg-biru-terang text-white border-l-2 border-kuning-emas font-semibold shadow-md' : 'hover:bg-biru-terang/30 text-slate-400 hover:text-white'">
                                <i class="fa-solid fa-file-signature text-xs" :class="currentTab === 'disposisi-berkas' ? 'text-kuning-emas' : ''"></i>
                                <span>Disposisi Berkas</span>
                            </button>

                            <button @click="currentTab = 'layanan-selesai'" 
                                    class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs font-medium transition-all duration-150"
                                    :class="currentTab === 'layanan-selesai' ? 'bg-biru-terang text-white border-l-2 border-kuning-emas font-semibold shadow-md' : 'hover:bg-biru-terang/30 text-slate-400 hover:text-white'">
                                <i class="fa-solid fa-circle-check text-xs" :class="currentTab === 'layanan-selesai' ? 'text-kuning-emas' : ''"></i>
                                <span>Layanan Selesai</span>
                            </button>
                        </div>
                    </div>

                    <button @click="currentTab = 'zoompah'; openKlikLayanan = false" 
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all duration-150"
                            :class="currentTab === 'zoompah' ? 'bg-biru-terang text-white border-l-4 border-kuning-emas shadow-lg' : 'hover:bg-biru-terang/40 hover:text-white'">
                        <i class="fa-solid fa-gavel text-base" :class="currentTab === 'zoompah' ? 'text-kuning-emas' : ''"></i>
                        <span>Zoompah Wali/Pengampu</span>
                    </button>

                    <button @click="currentTab = 'elapor'; openKlikLayanan = false" 
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all duration-150"
                            :class="currentTab === 'elapor' ? 'bg-biru-terang text-white border-l-4 border-kuning-emas shadow-lg' : 'hover:bg-biru-terang/40 hover:text-white'">
                        <i class="fa-solid fa-bullhorn text-base" :class="currentTab === 'elapor' ? 'text-kuning-emas' : ''"></i>
                        <span>e-Lapor Pengampu/Wali</span>
                    </button>
                </nav>
            </div>

            <div class="p-4 border-t border-slate-800 text-xs text-slate-500 font-mono text-center bg-slate-950/30">
                PANDUBHP V16.1 &copy; 2026
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white border-b border-slate-200/80 h-20 flex items-center px-8 sticky top-0 z-10 shadow-xs">
                <div>
                    <h2 class="text-xl font-outfit font-bold text-biru-tua" x-text="getTabTitle()"></h2>
                    <p class="text-xs text-slate-400 mt-0.5">Balai Harta Peninggalan Surabaya</p>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-8">
                <template x-if="currentTab === 'dashboard'">
                    <div class="bg-krem-card border border-amber-200/60 p-6 rounded-2xl shadow-xs">
                        <h3 class="text-lg font-bold text-biru-tua mb-2">Selamat Datang di Workspace PanduBHP</h3>
                        <p class="text-sm text-slate-600 leading-relaxed">Pondasi struktur warna emas, biru tua, dan krem berhasil dimuat. Konten filter, detail permohonan (Pengampuan, Perwalian, SKHW, Wasiat) serta metrik SLA akan diimplementasikan penuh di seksi ini.</p>
                    </div>
                </template>

                <template x-if="currentTab === 'permohonan-baru'">
                    <div class="space-y-4 h-full flex flex-col min-h-[650px]">
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-xs">
                            <h4 class="font-bold text-biru-tua text-sm">Form Layanan Publik BHP Surabaya</h4>
                            <p class="text-xs text-slate-400">Pengisian berkas ini otomatis tersambung ke database Google Sheets utama.</p>
                        </div>
                        <div class="flex-1 bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden relative">
                            <iframe :src="tallyUrl" class="w-full h-full border-0" title="Layanan Publik BHP Surabaya" frameborder="0" marginheight="0" marginwidth="0"></iframe>
                        </div>
                    </div>
                </template>

                <template x-if="currentTab === 'verifikasi-layanan'">
                    <div class="space-y-4 h-full flex flex-col min-h-[650px]">
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div>
                                <h3 class="text-md font-bold text-biru-tua">Workspace Verifikasi Formil & Materiil Persyaratan</h3>
                                <p class="text-xs text-slate-400">Pencarian Drive: Gunakan Nomor Layanan dan/atau Nama Terampu/Anak/Mendiang/Pewasiat</p>
                            </div>
                            <a :href="gdriveFolderUrl" target="_blank" class="w-full sm:w-auto bg-gradient-to-r from-amber-500 to-kuning-emas text-biru-tua text-xs font-bold py-3 px-5 rounded-xl flex items-center justify-center gap-2 shadow-md">
                                <i class="fa-solid fa-folder-open"></i><span>Verifikasi Formil, klik disini</span>
                            </a>
                        </div>
                        <div class="w-full flex-1 bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden relative">
                            <div class="sheet-container">
                                <iframe :src="sheetEmbedUrl" class="sheet-iframe" title="Database Terpadu BHP" frameborder="0"></iframe>
                            </div>
                        </div>
                    </div>
                </template>

                <template x-if="currentTab === 'verifikasi-pnbp'">
                    <div class="space-y-4 h-full flex flex-col min-h-[650px]">
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div>
                                <h3 class="text-md font-bold text-biru-tua">Workspace Rekonsiliasi & Verifikasi PNBP</h3>
                                <p class="text-xs text-slate-400">Pencarian Berkas: Silakan periksa kesesuaian nominal Slip Setoran Pajak / Voucher PNBP Pemohon</p>
                            </div>
                            <a :href="pnbpFolderUrl" target="_blank" class="w-full sm:w-auto bg-gradient-to-r from-emerald-600 to-emerald-500 text-white text-xs font-bold py-3 px-5 rounded-xl flex items-center justify-center gap-2 shadow-md">
                                <i class="fa-solid fa-receipt"></i><span>Kuitansi PNBP, Klik Sini</span>
                            </a>
                        </div>
                        <div class="w-full flex-1 bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden relative">
                            <div class="sheet-container">
                                <iframe :src="pnbpSheetEmbedUrl" class="sheet-iframe" title="Database PNBP BHP" frameborder="0"></iframe>
                            </div>
                        </div>
                    </div>
                </template>

                <template x-if="currentTab === 'disposisi-berkas'">
                    <div class="space-y-4 h-full flex flex-col min-h-[700px]">
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-xs flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div>
                                <h4 class="font-bold text-biru-tua text-sm">Form Disposisi Berkas Internal</h4>
                                <p class="text-xs text-slate-400">Gunakan formulir ini untuk melakukan disposisi peninjauan berkas layanan.</p>
                            </div>
                            <a :href="gformDisposisiSheetUrl" target="_blank" class="w-full sm:w-auto bg-amber-500 hover:bg-amber-600 border border-amber-600 text-biru-tua text-xs px-5 py-3 rounded-xl font-bold transition flex items-center justify-center gap-2 shadow-md">
                                <i class="fa-solid fa-table"></i> Disposisi Kasi, Klik Sini
                            </a>
                        </div>
                        <div class="flex-1 bg-slate-50 border border-slate-200 rounded-2xl shadow-sm overflow-hidden flex justify-center p-4">
                            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfYaM6FZOQHiB806f453lUu0y5rMT53ggysjZxBdhXZCSju1A/viewform?embedded=true" class="w-full max-w-3xl h-full border-0 rounded-xl shadow-xs bg-white" title="Form Disposisi Berkas" frameborder="0" marginheight="0" marginwidth="0">Memuat…</iframe>
                        </div>
                    </div>
                </template>

                <template x-if="currentTab === 'layanan-selesai'">
                    <div class="space-y-6 h-full flex flex-col">
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6">
                            <div class="flex items-start gap-4">
                                <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-blue-900 to-blue-700 flex items-center justify-center text-white border border-blue-600 shrink-0">
                                    <i class="fa-solid fa-cloud-arrow-up text-lg text-kuning-emas"></i>
                                </div>
                                <div>
                                    <h3 class="text-md font-bold text-biru-tua">Formulir Penutupan & Dokumen Layanan Selesai</h3>
                                    <p class="text-xs text-slate-400 mt-1">Sistem mendeteksi adanya fitur unggah berkas (*upload file*). Kawan bisa melakukan pengisian form, sekaligus meninjau folder Tanda Terima final melalui tombol di samping kanan.</p>
                                </div>
                            </div>
                            
                            <div class="flex flex-col sm:flex-row items-center gap-3 w-full xl:w-auto shrink-0">
                                <a :href="gformLayananSelesaiUrl" target="_blank" class="w-full sm:w-auto bg-gradient-to-r from-blue-700 to-blue-800 hover:from-blue-800 hover:to-blue-900 text-white text-xs font-bold py-3.5 px-6 rounded-xl transition flex items-center justify-center gap-2 shadow-md shrink-0">
                                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                                    <span>Isi Form & Upload Dokumen</span>
                                </a>

                                <a :href="gdriveTandaTerimaUrl" target="_blank" class="w-full sm:w-auto bg-gradient-to-r from-amber-500 to-kuning-emas hover:from-amber-600 hover:to-amber-500 text-biru-tua text-xs font-bold py-3.5 px-6 rounded-xl transition flex items-center justify-center gap-2 shadow-md">
                                    <i class="fa-solid fa-folder-tree"></i>
                                    <span>Folder Tanda Terima, Klik Sini</span>
                                </a>
                            </div>
                        </div>

                        <div class="flex-1 min-h-[500px] bg-white border border-slate-200 rounded-2xl shadow-sm p-5 flex flex-col gap-3">
                            <div class="flex items-center gap-2 border-b border-slate-100 pb-3">
                                <i class="fa-solid fa-table text-slate-400 text-sm"></i>
                                <span class="text-xs font-semibold text-slate-500 font-mono">MONITORING ARCHIVE DATA LAYANAN SELESAI (SPREADSHEET)</span>
                            </div>
                            <div class="flex-1 overflow-hidden relative rounded-xl border border-slate-100">
                                <div class="sheet-container">
                                    <iframe :src="gformLayananSelesaiSheetUrl" class="sheet-iframe" title="Database Layanan Selesai" frameborder="0"></iframe>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <template x-if="currentTab === 'zoompah'">
                    <div class="space-y-4 h-full flex flex-col min-h-[650px]">
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div>
                                <h3 class="text-md font-bold text-biru-tua">Kalender Pelaksanaan Sumpah Digital (Zoompah)</h3>
                                <p class="text-xs text-slate-400">Jadwal otomatis sinkron dengan Google Calendar</p>
                            </div>
                            <a :href="editJadwalSheetUrl" target="_blank" class="w-full sm:w-auto bg-biru-tua text-kuning-emas text-xs font-bold py-3 px-5 rounded-xl shadow-md">
                                <i class="fa-solid fa-pen-to-square"></i><span>Edit Jadwal Zoompah, Klik Sini</span>
                            </a>
                        </div>
                        <div class="w-full flex-1 bg-white border border-slate-200 rounded-2xl shadow-sm p-4 overflow-hidden relative">
                            <iframe src="https://calendar.google.com/calendar/embed?src=layanan.bhpsby%40gmail.com&ctz=Asia%2FJakarta" style="border: 0" class="w-full h-full" frameborder="0" scrolling="no"></iframe>
                        </div>
                    </div>
                </template>

                <template x-if="currentTab === 'elapor'">
                    <div class="h-full w-full">
                        </div>
                </template>
            </div>
        </main>
